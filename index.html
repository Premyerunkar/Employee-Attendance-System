<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Attendance & Shift Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen font-sans p-6">

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl flex flex-col justify-between">
            <div>
                <h2 class="text-xl font-bold border-b border-gray-800 pb-3 mb-4 text-blue-400">Gate Terminal</h2>
                <p class="text-sm text-gray-400 mb-4">Run this section on the phone placed at your gate entrance.</p>
                
                <div id="scan-box" class="bg-gray-950 border-2 border-dashed border-gray-800 rounded-xl p-8 text-center flex flex-col items-center justify-center min-h-[200px] transition-all duration-300">
                    <p id="scan-message" class="text-gray-500 font-medium">Terminal offline</p>
                </div>
            </div>
            
            <button id="activate-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all mt-4">
                Activate NFC Antenna
            </button>
        </div>

        <div class="md:col-span-2 bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl flex flex-col">
            <h2 class="text-xl font-bold text-red-400 border-b border-gray-800 pb-3 mb-4">Live Console Logs & Errors</h2>
            <div id="debug-console" class="bg-gray-950 rounded-xl p-4 font-mono text-xs text-green-400 overflow-y-auto flex-1 min-h-[250px] border border-gray-800 space-y-1">
                <p class="text-gray-500">// System Diagnostic Logger Initialized...</p>
            </div>
        </div>
    </div>

    <script>
        // On-screen console interceptor to print errors directly onto your phone screen
        const debugConsole = document.getElementById('debug-console');
        function logDebug(message, isError = false) {
            const p = document.createElement('p');
            p.className = isError ? "text-red-400 font-bold bg-red-950/20 p-1 rounded" : "text-emerald-400";
            p.innerText = `[${new Date().toLocaleTimeString()}] ${message}`;
            debugConsole.appendChild(p);
            debugConsole.scrollTop = debugConsole.scrollHeight;
        }

        // Intercept global uncaught script errors
        window.onerror = function(message, source, lineno, colno, error) {
            logDebug(`CRASH ERROR: ${message} at line ${lineno}:${colno}`, true);
            return false;
        };

        logDebug("Initializing core variables...");
        
        const SUPABASE_URL = "https://bedwcfrjtafebpwqtwrh.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJlZHdjZnJqdGFmZWJwd3F0d3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MTg3MjEsImV4cCI6MjA5NDk5NDcyMX0.y1d64jhCEXE_BU41x5u2ADYUmSGDPWj7yDOGUW6wL9g";
        
        let supabase = null;

        try {
            logDebug("Verifying Supabase SDK window object configuration...");
            // Detect if the CDN library file loaded successfully or got blocked by the network
            if (typeof supabase === 'undefined' && typeof window.supabase === 'undefined' && typeof window.Supabase === 'undefined') {
                logDebug("CRITICAL: The Supabase SDK script library failed to load from the CDN entirely!", true);
            } else {
                const clientCreator = window.supabase?.createClient || window.Supabase?.createClient;
                if (clientCreator) {
                    supabase = clientCreator(SUPABASE_URL, SUPABASE_ANON_KEY);
                    logDebug("✅ Supabase secure client connection built successfully!");
                } else {
                    logDebug("CRITICAL: Supabase script exists but createClient method is missing.", true);
                }
            }
        } catch (e) {
            logDebug(`CRITICAL CORE CRASH: ${e.message}`, true);
        }

        const activateBtn = document.getElementById('activate-btn');
        const scanBox = document.getElementById('scan-box');
        const scanMessage = document.getElementById('scan-message');

        // Check if browser recognizes Web NFC framework immediately on load
        if (!('NDEFReader' in window)) {
            logDebug("WARNING: 'NDEFReader' is completely missing in this browser's window scope! Check HTTPS or chrome://flags configuration.", true);
        } else {
            logDebug("✅ Hardware link verified: NDEFReader is available in browser.");
        }

        activateBtn.addEventListener('click', async () => {
            logDebug("User clicked 'Activate NFC Antenna' button.");
            
            // Force text modification immediately upon touch engagement
            updateTerminalUI("Waiting for Card Tap...", "bg-blue-950/40", "border-blue-500/50", "text-blue-400");
            activateBtn.style.display = 'none';
            logDebug("Terminal interface updated to scan layout stance.");

            if ('NDEFReader' in window) {
                try {
                    logDebug("Requesting hardware radio connection from Android kernel...");
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    logDebug("📡 NFC Antenna running in background thread. Ready to receive chip waves!");

                    ndef.addEventListener("reading", async ({ serialNumber }) => {
                        logDebug(`🎯 Physical Card Detected! UID Captured: ${serialNumber}`);
                        updateTerminalUI(`Processing: ${serialNumber}`, "bg-yellow-950/40", "border-yellow-500/50", "text-yellow-400");
                        
                        if (!supabase) {
                            logDebug("Transaction Aborted: Supabase database client instance is null.", true);
                            updateTerminalUI("Error: Database link dead", "bg-red-950/40", "border-red-500/50", "text-red-400");
                            return;
                        }

                        logDebug("Firing network RPC call to database: record_nfc_tap...");
                        const { error } = await supabase.rpc('record_nfc_tap', { card_uid: serialNumber });

                        if (error) {
                            logDebug(`Database processing rejected: ${error.message}`, true);
                            updateTerminalUI(`Error: ${error.message}`, "bg-red-950/40", "border-red-500/50", "text-red-400");
                        } else {
                            logDebug("🎉 Database successfully computed shift records!");
                            updateTerminalUI("✅ Tap Registered!", "bg-emerald-950/40", "border-emerald-500/50", "text-emerald-400");
                            triggerBeep();
                        }
                        
                        setTimeout(() => {
                            updateTerminalUI("Ready for next employee...", "bg-blue-950/20", "border-blue-500/30", "text-blue-400");
                        }, 2500);
                    });

                } catch (err) { 
                    activateBtn.style.display = 'block';
                    updateTerminalUI("Terminal offline", "bg-gray-950", "border-gray-800", "text-gray-500");
                    logDebug(`Hardware Activation Crashed: ${err.message}`, true);
                }
            } else {
                logDebug("Execution stopped: NDEFReader missing during event execution handler context.", true);
            }
        });

        function updateTerminalUI(msg, bg, border, text) {
            scanMessage.innerText = msg;
            scanMessage.className = `font-bold ${text}`;
            scanBox.className = `border-2 border-solid rounded-xl p-8 text-center flex flex-col items-center justify-center min-h-[200px] transition-all duration-200 ${bg} ${border}`;
        }

        function triggerBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.connect(ctx.destination);
                osc.frequency.setValueAtTime(950, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.15);
            } catch(e) {}
        }
    </script>
</body>
</html>
